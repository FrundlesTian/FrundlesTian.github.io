<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frundles Tian - Desktop</title>
    <link rel="icon" href="res/images/Windows_XP_logo.png" />
    <link rel="stylesheet" href="https://unpkg.com/xp.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body class="surface" ontouchstart>
    <main class="desktop" aria-label="Windows XP style desktop">
      <nav
        class="desktop-icons"
        id="desktop-icons"
        aria-label="Desktop shortcuts"
      ></nav>

      <section
        class="window welcome-window"
        id="welcome-window"
        aria-label="Welcome"
      >
        <div class="title-bar">
          <div class="title-bar-text">Welcome</div>
          <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
          </div>
        </div>
        <div class="window-body">
          <div class="welcome-content">
            <img src="res/images/MrFrundles.jpg" alt="MrFrundles" />
            <div>
              <h1>Frundles Tian</h1>
              <p>
                This is a Personal desktop, small archive, and some experiments.
              </p>
            </div>
          </div>
          <div class="welcome-actions field-row">
            <button type="button" id="welcome-close">Let's go!</button>
            <button type="button" id="welcome-exit">Get me outta here</button>
          </div>
        </div>
      </section>

      <section
        class="window explorer-window is-closed"
        id="explorer-window"
        aria-label="File Explorer"
      >
        <div class="title-bar">
          <div class="title-bar-text" id="explorer-title">File Explorer</div>
          <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
          </div>
        </div>
        <div class="window-body">
          <div class="explorer-toolbar field-row">
            <button type="button" id="explorer-back">Back</button>
            <div class="explorer-path" id="explorer-path">folder</div>
          </div>
          <div id="explorer-content"></div>
          <div class="status-bar">
            <p class="status-bar-field" id="explorer-count">0 items</p>
            <p class="status-bar-field" id="explorer-status">Ready</p>
          </div>
        </div>
      </section>

      <section
        class="window browser-window is-closed"
        id="browser-window"
        aria-label="Internet exploer"
      >
        <div class="title-bar">
          <div class="title-bar-text browser-title-text">
            <img src="res/icon/1481.ico" alt="" />
            <span id="browser-title">Internet exploer</span>
          </div>
          <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
          </div>
        </div>
        <div class="window-body">
          <nav class="ie-menu-bar" aria-label="Internet exploer menu">
            <button type="button">File</button>
            <button type="button">Edit</button>
            <button type="button">View</button>
            <button type="button">Favorites</button>
            <button type="button">Tools</button>
            <button type="button">Help</button>
          </nav>
          <div class="ie-command-bar" aria-label="Internet exploer toolbar">
            <button type="button" class="ie-tool-button" id="browser-back">
              <span class="ie-tool-icon is-back" aria-hidden="true">‹</span>
              <span>Back</span>
            </button>
            <button type="button" class="ie-tool-button is-muted">
              <span class="ie-tool-icon is-forward" aria-hidden="true">›</span>
            </button>
            <span class="ie-separator" aria-hidden="true"></span>
            <button
              type="button"
              class="ie-square-tool"
              id="browser-stop"
              aria-label="Stop"
            >
              <span aria-hidden="true">×</span>
            </button>
            <button
              type="button"
              class="ie-square-tool"
              id="browser-refresh"
              aria-label="Refresh"
            >
              <span aria-hidden="true">↻</span>
            </button>
            <button
              type="button"
              class="ie-square-tool"
              id="browser-home"
              aria-label="Home"
            >
              <span aria-hidden="true">⌂</span>
            </button>
            <span class="ie-separator" aria-hidden="true"></span>
            <button type="button" class="ie-tool-button">
              <span class="ie-large-symbol" aria-hidden="true">⌕</span>
              <span>Search</span>
            </button>
            <button type="button" class="ie-tool-button">
              <span class="ie-large-symbol is-star" aria-hidden="true">★</span>
              <span>Favorites</span>
            </button>
            <span class="ie-spacer"></span>
            <img
              class="ie-windows-mark"
              src="res/images/Windows_XP_logo.png"
              alt=""
            />
          </div>
          <form class="browser-toolbar" id="browser-form">
            <label for="browser-address">Address</label>
            <div class="ie-address-box">
              <img src="res/icon/1481.ico" alt="" />
              <input
                id="browser-address"
                type="text"
                value="https://happy?/"
                autocomplete="off"
                spellcheck="false"
              />
              <button
                type="button"
                class="ie-address-dropdown"
                aria-label="Address history"
              >
                ▾
              </button>
            </div>
            <button type="submit" class="ie-go-button">
              <span aria-hidden="true">➜</span>
              Go
            </button>
          </form>
          <div class="browser-frame-wrap">
            <iframe
              id="browser-frame"
              title="Internet exploer page"
              src="internet/home.html"
            ></iframe>
          </div>
          <div class="status-bar">
            <p class="status-bar-field" id="browser-status">Done</p>
            <p class="status-bar-field browser-status-blank"></p>
            <p class="status-bar-field browser-zone">
              <img src="res/icon/1481.ico" alt="" />
              Internet
            </p>
          </div>
        </div>
      </section>
    </main>

    <div hidden aria-hidden="true">
      <a
        href="https://clustrmaps.com/site/1c94o"
        title="ClustrMaps"
        rel="noopener noreferrer"
      >
        <img
          src="//www.clustrmaps.com/map_v2.png?d=7TPt_0ny1YPx3c77XAMEQ5kNWR9xOh-6brNq2ZquA_0&cl=ffffff"
          alt=""
        />
      </a>
    </div>

    <footer class="taskbar" aria-label="Taskbar">
      <a class="start-button" href="index.html">
        <img src="res/images/Windows_XP_logo.png" alt="" />
        <span>start</span>
      </a>
      <button
        class="taskbar-item is-active"
        type="button"
        data-window-target="welcome-window"
      >
        Welcome
      </button>
      <button
        class="taskbar-item is-hidden"
        type="button"
        data-window-target="explorer-window"
      >
        File Explorer
      </button>
      <button
        class="taskbar-item is-hidden"
        type="button"
        data-window-target="browser-window"
      >
        Internet exploer
      </button>
      <div class="taskbar-spacer"></div>
      <div class="clock" id="clock" aria-live="polite">
        <button
          type="button"
          class="tray-icon-button"
          id="music-toggle"
          aria-label="Play music"
          aria-pressed="false"
          title="Play music"
          style="min-width: 22px"
        >
          <img src="res/icon/1060.ico" alt="" />
        </button>
        <span class="tray-icons" aria-hidden="true">
          <img src="res/icon/1036.ico" alt="" />
          <img src="res/icon/976.ico" alt="" />
        </span>
        <span id="clock-time">00:00</span>
      </div>
    </footer>

    <script src="WindowsXP.js" defer></script>
  </body>
</html>
